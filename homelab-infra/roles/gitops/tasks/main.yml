---
- name: Grants Argo CD namespace exists 
  kubernetes.core.k8s:
    name: "{{ argocd_namespace }}"
    api_version: v1
    kind: Namespace
    state: present

- name: Apply manifestsof Argo CD instalation
  kubernetes.core.k8s:
        state: present
        namespace: "{{ argocd_namespace }}"
        src: "https://raw.githubusercontent.com/argoproj/argo-cd/{{ argocd_version }}/manifests/install.yaml"

- name: Wait Argo CD server instalation finish
  kubernetes.core.k8s_info:
    kind: Deployment
    name: argocd-server
    namespace: "{{ argocd_namespace }}"
  register: argocd_server
  until:
    - argocd_server.resources is defined
    - argocd_server.resources | length > 0
    - argocd_server.resources[0].status.readyReplicas is defined
    - argocd_server.resources[0].status.readyReplicas > 0
  retries: 20
  delay: 10

- name: Creates a Application in Argo CD using Definition Inline
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: argoproj.io/v1alpha1
      kind: Application
      metadata:
        name: MyApp
        namespace: "{{ argocd_namespace }}"
      spec:
        project: default
        source:
          repoURL: 'https://github.com/Carneiro1908/KubernetesBareMetal'
          targetRevision: HEAD
          path: guestbook
        destination:
          server: 'https://kubernetes.default.svc'
          namespace: default
        syncPolicy:
          automated:
            prune: true
            selfHeal: true