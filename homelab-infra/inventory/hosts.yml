# ansible_connection: local because this playbook runs directly on the
# target machine (inside WSL on the VM) — there is no need for SSH loopback,
# since the SSH hop from the CI runner to the VM already happened before
# ansible-playbook is invoked.
all:
  children:
    k3s_nodes:
      hosts:
        homelab-server:
          ansible_connection: local
          ansible_user: root