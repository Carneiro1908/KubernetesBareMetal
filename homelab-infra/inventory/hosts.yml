# This file is a placeholder committed to the repository for documentation
# purposes only. At runtime, the CI workflow overwrites this file with real
# values (ANSIBLE_HOST, ANSIBLE_USER) rendered from GitHub Secrets, before
# rsyncing the project to the target VM.
#
# To run this manually (outside CI), replace the placeholders below with
# real values, or export ANSIBLE_HOST / ANSIBLE_USER and use the
# render step from the workflow.

all:
  children:
    k8s_nodes:
      hosts:
        homelab-server:
          ansible_host: "REPLACE_ME_IP"
          ansible_user: "REPLACE_ME_USER"
          ansible_ssh_private_key_file: "REPLACE_ME_PRIVATE_KEY_PATH"