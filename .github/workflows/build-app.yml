name: Build App

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build_app:
    runs-on: ubuntu-latest

    env:
      IMAGE_REPOSITORY: carneiro1908/app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: carneiro1908
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set image tag
        id: vars
        run: |
          echo "IMAGE_TAG=sha-${GITHUB_SHA::12}" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=${IMAGE_REPOSITORY}:${IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build image
        working-directory: ./app
        run: docker build -t "$IMAGE_NAME" .

      - name: Push image
        run: docker push "$IMAGE_NAME"

      - name: Update Kubernetes manifest
        run: |
          sed -i "s|image: .*|image: ${IMAGE_NAME}|" guestbook/webapp/deployment.yml

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add guestbook/webapp/deployment.yml
          git commit -m "chore: update app image to ${IMAGE_TAG}" || echo "No changes to commit"
          git push