name: Manage homelab infrastructure

on:
  workflow_dispatch:
    inputs:
      k3s_action:
        description: "The action to run against the cluster"
        required: true
        default: 'apply'
        type: choice
        options:
          - apply
          - destroy
      debug:
        description: "Run extra diagnostic checks (inventory bytes, ansible ping -vvv)"
        required: false
        default: false
        type: boolean

jobs:
  deploy_homelab_infrastructure:
    runs-on: self-hosted

    env:
      ANSIBLE_HOST: ${{ secrets.ANSIBLE_HOST }}
      ANSIBLE_USER: ${{ secrets.ANSIBLE_USER }}

    steps:
      - name: Code checkout
        uses: actions/checkout@v4
        with:
          # Prevent Git on Windows from converting LF to CRLF on checkout,
          # which corrupts YAML files (e.g. inventory) once copied to Linux
          autocrlf: input

      - name: Create SSH key
        run: |
          mkdir -p ~/.ssh

          cat > ~/.ssh/github_actions_ssh_key << 'EOF'
          ${{ secrets.TARGET_VM_SSH_PRIVATE_KEY }}
          EOF

          chmod 600 ~/.ssh/github_actions_ssh_key

          # Sanity check: confirms the key was written correctly and is a valid key
          ssh-keygen -lf ~/.ssh/github_actions_ssh_key

      - name: Installing Rsync
        # No password prompt needed: sudoers is scoped to allow only this
        # specific apt-get command without a prompt, restricted to this user.
        # See /etc/sudoers.d/github-actions-runner on the runner machine.
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync

      - name: Sending homelab-infra to the target VM
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 10
          retry_wait_seconds: 5
          command: |
            rsync -avzP -e "ssh -i ~/.ssh/github_actions_ssh_key -o StrictHostKeyChecking=no" \
              ./homelab-infra "$ANSIBLE_USER@$ANSIBLE_HOST":HomeLabK8sProjectFiles

      - name: Debug inventory and local execution (optional)
        if: ${{ inputs.debug == true }}
        run: |
          ssh -i ~/.ssh/github_actions_ssh_key \
            -o StrictHostKeyChecking=no \
            "$ANSIBLE_USER@$ANSIBLE_HOST" wsl bash << 'EOF_SSH'
            set -euo pipefail
            cd ./HomeLabK8sProjectFiles/homelab-infra

            echo "=== Ansible inventory parsing check ==="
            ANSIBLE_CONFIG=./ansible.cfg ansible-inventory -i inventory/hosts.yml --list

            echo "=== Ansible local connectivity check ==="
            ANSIBLE_CONFIG=./ansible.cfg ansible -i inventory/hosts.yml k8s_nodes -m ping -vvv
          EOF_SSH

      - name: Execute Ansible Playbook via SSH and WSL
        run: |
          ssh -i ~/.ssh/github_actions_ssh_key \
            -o StrictHostKeyChecking=no \
            "$ANSIBLE_USER@$ANSIBLE_HOST" wsl bash <<'EOF_SSH'
            set -euo pipefail

            echo "SSH OK. Inside WSL directly..."
            cd ./HomeLabK8sProjectFiles/homelab-infra

            # ACTION comes from the workflow_dispatch input, safe to expand
            # here (GitHub Actions substitutes it at workflow parse time,
            # before this script is even built).
            ACTION="${{ github.event.inputs.k3s_action }}"

            case "$ACTION" in
              "apply")
                PLAYBOOK="apply.yml"
                ;;
              "destroy")
                PLAYBOOK="destroy.yml"
                ;;
              *)
                echo "Invalid action: $ACTION"
                exit 1
                ;;
            esac

            echo "Selected playbook: $PLAYBOOK"

            ANSIBLE_CONFIG=./ansible.cfg ansible-playbook -i inventory/hosts.yml "playbooks/${PLAYBOOK}" --extra-vars "ansible_become_password=${{ secrets.REMOTE_SUDO_PASSWORD }}" --check

            ANSIBLE_CONFIG=./ansible.cfg ansible-playbook -i inventory/hosts.yml "playbooks/${PLAYBOOK}" --extra-vars "ansible_become_password=${{ secrets.REMOTE_SUDO_PASSWORD }}"

            # 3. Only wait for / validate the cluster on "apply" — on
            # "destroy" there is no cluster left to check
            if [ "$ACTION" = "apply" ]; then
              echo "Waiting for cluster initialization..."
              sleep 120

              export KUBECONFIG="$HOME/kubeconfig/homelab.yaml"
              sed -i "s/127.0.0.1/$ANSIBLE_HOST/" "$KUBECONFIG"

              echo "Checking cluster nodes status..."
              kubectl get nodes
            else
              echo "Destroy complete, skipping cluster validation."
            fi

            # 4. Remove the project directory from the target VM to avoid leaking
            # infrastructure code / rendered inventory on the remote filesystem
            cd ..
            rm -rf HomeLabK8sProjectFiles
          EOF_SSH

      - name: Uninstalling Rsync
        if: always()
        run: |
          sudo apt-get remove -y rsync

      - name: Clean up local SSH key
        if: always()
        run: |
          # Never leave the private key lying around on the runner's disk
          # after the job finishes, regardless of success or failure
          rm -f ~/.ssh/github_actions_ssh_key